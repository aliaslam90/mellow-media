<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mellow Media — The chill way to build a hot brand</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Caveat:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Loading screen — plays logo animation, then fades out -->
  <div id="loader" style="
    position: fixed; inset: 0; z-index: 100000;
    background: linear-gradient(180deg, #3A2618 0%, #1f140a 100%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  ">
    <video id="loader-video" autoplay muted playsinline
      style="width: min(70vw, 420px); height: auto;">
    </video>
  </div>
  <script>
    (function () {
      var loader = document.getElementById('loader');
      var video  = document.getElementById('loader-video');

      // Transparent WebM on the dark background where supported;
      // otherwise fall back to the original mp4 on white so the
      // video's own white background blends in.
      if (video.canPlayType('video/webm; codecs="vp9"')) {
        video.src = 'assets/video/loading.webm';
      } else {
        video.src = 'assets/video/loading.mp4';
        loader.style.background = '#FFFFFF';
      }
      var done   = false;
      function hide() {
        if (done) return;
        done = true;
        loader.style.opacity = '0';
        setTimeout(function () { loader.remove(); }, 650);
      }
      video.addEventListener('ended', hide);
      video.addEventListener('error', hide);
      // Safety net: never block the site for more than 6s
      setTimeout(hide, 6000);
      // Reduced motion: skip straight to content
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) hide();
    })();
  </script>

  <div id="root"></div>

  <!-- React + Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App components (order matters) -->
  <script type="text/babel" src="js/components.js"></script>
  <script type="text/babel" src="js/sections.js"></script>
  <script type="text/babel" src="js/app.js"></script>

  <!-- Animations: cursor, click burst, scroll reveal -->
  <script src="js/animations.js"></script>

</body>
</html>
